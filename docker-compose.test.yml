# docker-compose.test.yml — Test environment
# Separate ports from dev (5433/6380) — never conflicts with running dev environment
# Run automatically by vitest globalSetup. Manual: docker compose -f docker-compose.test.yml up -d
# Uses tmpfs for postgres — in-memory, fast, no disk writes

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: lexis-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: lexis_test
      POSTGRES_USER: lexis
      POSTGRES_PASSWORD: lexis_test_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexis -d lexis_test"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: lexis-redis-test
    ports:
      - "6380:6379"
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
